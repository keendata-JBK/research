<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>科杰领导每日3分钟战略简报</title>
  <style>
    :root{--bg:#f4f7fb;--panel:#fff;--ink:#101828;--muted:#667085;--blue:#1358db;--line:#dbe4f0;--red:#e11d48;--orange:#f59e0b;--green:#0e9f6e;--shadow:0 16px 40px rgba(15,23,42,.08);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% 0,#e7f1ff 0,transparent 38%),var(--bg);color:var(--ink)}.wrap{max-width:1120px;margin:0 auto;padding:18px}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.brand{width:220px;height:64px;padding:7px 10px;border:1px solid var(--line);border-radius:14px;background:#fff}.brand img{width:100%;height:100%;object-fit:contain;display:block}.btn{border:1px solid var(--line);background:#fff;color:#1358db;border-radius:12px;padding:10px 14px;font-weight:800;text-decoration:none}.hero{background:linear-gradient(135deg,#fff,#edf5ff 68%,#e7f7ff);border:1px solid var(--line);border-radius:24px;padding:24px;box-shadow:var(--shadow);margin-bottom:14px}.eyebrow{color:var(--blue);font-weight:900;letter-spacing:.08em;text-transform:uppercase;margin:0 0 8px}.hero h1{margin:0 0 10px;font-size:clamp(26px,4vw,42px);letter-spacing:-.05em}.hero p{margin:0;color:#475467;line-height:1.7}.meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}.meta span,.tag{background:#edf5ff;color:#0b3b8f;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:800}.grid{display:grid;grid-template-columns:1.2fr .8fr;gap:14px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}.panel h2{margin:0 0 12px;font-size:20px}.signal{border-top:1px solid #eef2f8;padding:14px 0}.signal:first-of-type{border-top:0}.signal-head{display:flex;align-items:flex-start;gap:10px}.rank{width:26px;height:26px;border-radius:9px;background:var(--blue);color:#fff;display:grid;place-items:center;font-weight:900;flex:0 0 auto}.signal strong{flex:1}.impact{padding:4px 8px;border-radius:999px;font-size:12px;font-weight:900}.impact.高{background:#fff1f2;color:var(--red)}.impact.中{background:#fffbeb;color:#b45309}.impact.低{background:#f2f4f7;color:var(--muted)}.signal p,.card p,li{color:#475467;line-height:1.7}.signal small{display:block;color:var(--muted);line-height:1.7}.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.card{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fff}.card .owner{color:var(--blue);font-size:12px;font-weight:900}.card h3{margin:6px 0 8px;font-size:16px}.q{margin:0;padding-left:22px;display:grid;gap:10px}.risk{background:#fff7ed;border-color:#fed7aa}.footer{color:var(--muted);font-size:12px;text-align:center;margin:22px 0}.empty{color:var(--muted);text-align:center;padding:48px 0}@media(max-width:760px){.wrap{padding:12px}.top{align-items:center}.brand{width:172px;height:54px}.grid,.cards{grid-template-columns:1fr}.hero,.panel{border-radius:18px;padding:16px}.signal-head{align-items:flex-start}.btn{padding:8px 10px}.meta span{font-size:11px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand"><img src="./assets/keendata-logo.png" alt="科杰科技 Keen Data" /></div>
      <a class="btn" href="./">返回平台首页</a>
    </div>
    <main id="app"><div class="empty">正在加载领导每日3分钟战略简报...</div></main>
    <div class="footer">数据来源：实时竞对雷达 / GitHub Actions / 手动导入材料。自动生成内容为候选分析，正式结论需人工审核。</div>
  </div>
<script>
function impactClass(v){return 'impact '+(v||'低')}
function tags(list){return (list||[]).map(t=>`<span class="tag">${t}</span>`).join('')}
function safe(v){return String(v||'').replace(/[&<>"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]))}
async function main(){
  const res=await fetch('./generated/leader-brief.json?ts='+Date.now());
  const b=await res.json();
  document.getElementById('app').innerHTML=`
    <section class="hero"><p class="eyebrow">Leader Daily Brief</p><h1>${safe(b.title||'领导每日3分钟战略简报')}</h1><p>${safe(b.summary||'暂无摘要')}</p><div class="meta"><span>生成：${b.generatedAt?new Date(b.generatedAt).toLocaleString():'待生成'}</span><span>事件：${b.sourceStats?.events||0}</span><span>主题：${b.sourceStats?.themes||0}</span><span>启发：${b.sourceStats?.implications||0}</span></div></section>
    <div class="grid"><section class="panel"><h2>1. 今日重点信号</h2>${(b.topSignals||[]).map((x,i)=>`<article class="signal"><div class="signal-head"><span class="rank">${i+1}</span><strong>${safe(x.company)}｜${safe(x.title)}</strong><span class="${impactClass(x.impact)}">${safe(x.impact)}</span></div><p>${safe(x.summary)}</p><small>${safe(x.whyItMatters)}</small><div class="tags">${tags(x.tags)}</div></article>`).join('')||'<div class="empty">暂无新增重点信号。</div>'}</section><section class="panel"><h2>2. 今日建议讨论</h2><ol class="q">${(b.keyQuestions||[]).map(q=>`<li>${safe(q)}</li>`).join('')||'<li>暂无。</li>'}</ol></section></div>
    <section class="panel"><h2>3. 对科杰的启发候选</h2><div class="cards">${(b.kejieImplications||[]).map(x=>`<article class="card"><div class="owner">${safe(x.category)}｜${safe(x.status)}</div><h3>${safe(x.title)}</h3><p>${safe(x.insight)}</p><p><b>动作：</b>${safe(x.action)}</p></article>`).join('')||'<div class="empty">暂无。</div>'}</div></section>
    <section class="panel"><h2>4. 建议动作</h2><div class="cards">${(b.actions||[]).map(x=>`<article class="card"><div class="owner">${safe(x.owner)}｜${safe(x.priority)}</div><h3>${safe(x.title)}</h3><p>${safe(x.detail)}</p></article>`).join('')}</div></section>
    <section class="panel risk"><h2>5. 风险提示</h2><ol class="q">${(b.riskWarnings||[]).map(r=>`<li>${safe(r)}</li>`).join('')||'<li>暂无。</li>'}</ol></section>`
}
main().catch(()=>{document.getElementById('app').innerHTML='<div class="empty">简报加载失败，请确认 radar workflow 已运行。</div>'})
</script>
</body>
</html>
