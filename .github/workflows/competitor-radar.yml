name: Competitor Radar Scan

on:
  schedule:
    - cron: '20 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run radar scanner
        run: node scripts/scan-radar.mjs
      - name: Generate leader brief
        run: node scripts/generate-leader-brief.mjs
      - name: Commit generated intelligence data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update competitor radar and leader brief'
          file_pattern: 'public/generated/radar.json public/generated/leader-brief.json content/briefs/*.md content/leader-briefs/*.md'
